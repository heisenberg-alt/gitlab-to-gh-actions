stages:
  - deps
  - build
  - test

install_deps:
  stage: deps
  image: node:20
  script:
    - npm ci
  cache:
    key:
      files:
        - package-lock.json
      prefix: $CI_COMMIT_REF_SLUG
    paths:
      - node_modules/
    policy: push

build:
  stage: build
  image: node:20
  script:
    - npm run build
  cache:
    key:
      files:
        - package-lock.json
      prefix: $CI_COMMIT_REF_SLUG
    paths:
      - node_modules/
    policy: pull
  artifacts:
    paths:
      - dist/

test:
  stage: test
  image: node:20
  script:
    - npm test
  cache:
    key:
      files:
        - package-lock.json
      prefix: $CI_COMMIT_REF_SLUG
    paths:
      - node_modules/
    policy: pull
    fallback_keys:
      - main-node-modules
