stages:
  - build
  - trigger

build:
  stage: build
  script:
    - make build

trigger_deploy:
  stage: trigger
  trigger:
    project: team/deploy-service
    branch: main
    strategy: depend
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

trigger_docs:
  stage: trigger
  trigger:
    include: docs/.gitlab-ci.yml
    strategy: depend
