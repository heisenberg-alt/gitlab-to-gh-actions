stages:
  - test

test:
  stage: test
  image: $IMAGE
  parallel:
    matrix:
      - IMAGE: ["python:3.10", "python:3.11", "python:3.12"]
        DB: ["postgres", "mysql"]
      - IMAGE: ["python:3.12"]
        DB: ["sqlite"]
  services:
    - name: ${DB}:latest
  script:
    - pip install -r requirements.txt
    - pytest -v
  allow_failure:
    exit_codes: [137]
