name: Test Matrix
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.10"
            db: postgres
          - python-version: "3.10"
            db: mysql
          - python-version: "3.11"
            db: postgres
          - python-version: "3.11"
            db: mysql
          - python-version: "3.12"
            db: postgres
          - python-version: "3.12"
            db: mysql
          - python-version: "3.12"
            db: sqlite
    services:
      db:
        image: ${{ matrix.db }}:latest
        ports:
          - 5432:5432
          - 3306:3306
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -r requirements.txt
      - run: pytest -v
        # NOTE: allow_failure with exit_codes has no direct equivalent.
        # Using continue-on-error as a rough approximation.
        continue-on-error: true
