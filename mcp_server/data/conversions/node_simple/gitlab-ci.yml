stages:
  - install
  - test
  - build
  - deploy

variables:
  NODE_VERSION: "20"

install:
  stage: install
  image: node:20
  script:
    - npm ci
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/

test:
  stage: test
  image: node:20
  script:
    - npm test
  artifacts:
    reports:
      junit: test-results.xml

build:
  stage: build
  image: node:20
  script:
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

deploy:
  stage: deploy
  image: node:20
  script:
    - npm run deploy
  environment:
    name: production
  only:
    - main
